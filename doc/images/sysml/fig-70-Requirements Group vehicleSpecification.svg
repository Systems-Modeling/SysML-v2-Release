@startuml
skin sysmlbw
skinparam monochrome true
skinparam wrapWidth 300
hide circle
 
comp usage "vehicleSpecification " as E1  <<(T,blue) requirement>> [[psysml:561f4075-21e1-4459-b2a5-b1f0a8b24dca ]] {
}
comp usage "vehicle" as E2 <<subject>>[[psysml:94b238ad-45db-45cc-bd07-5321f34a8cd2 ]] {
##//attributes//##
dryMass:> ISQBase::mass
}
comp usage "~<1> vehicleMassRequirement: MassRequirement " as E3  <<(T,blue) requirement>> [[psysml:85718f4b-05c4-40ec-9702-a60d57756a9a ]] {
##//doc//##
The total mass of the vehicle shall be less than or equal to the required mass.\nAssume total mass includes a full tank of gas of 60 kg
- -
##//attributes//##
massRequired <U+003D>2000 [kg]\n//:>>MassRequirement::massRequired// 
massActual <U+003D> vehicle.dryMass + fuelMassActual\n//:>>MassRequirement::massActual// 
fuelMassActual:> ISQBase::mass
fuelMassMax:> ISQBase::mass <U+003D> 60 [kg]
- -
##//constraints//##
<b>assume</b> {fuelMassActual<U+003D><U+003D>fuelMassMax}
}
comp usage "~<2> vehicleFuelEconomyRequirements " as E4  <<(T,blue) requirement>> [[psysml:bc807797-353a-4719-8f1f-46bff220579c ]] {
##//doc//##
fuel economy requirements group
- -
##//attributes//##
assumedCargoMass:> ISQBase::mass
- -
##//subject//##

}
comp usage "~<2_1> cityFuelEconomyRequirement: FuelEconomyRequirement " as E5  <<(T,blue) requirement>> [[psysml:de33cbbf-5d36-4e34-86ce-5495319792c3 ]] {
##//references//##
requiredFuelEconomy <U+003D> 10 [km <U+002F> L]\n//:>>FuelEconomyRequirement::requiredFuelEconomy// 
- -
##//constraints//##
<b>assume</b> {assumedCargoMass<U+003C><U+003D>500 [kg]}
}
comp usage "~<2_2> highwayFuelEconomyRequirement: FuelEconomyRequirement " as E6  <<(T,blue) requirement>> [[psysml:cdb335cf-2bb6-4c65-8b23-adfc09f5d13c ]] {
##//references//##
requiredFuelEconomy <U+003D> 12.75 [km <U+002F> L]\n//:>>FuelEconomyRequirement::requiredFuelEconomy// 
- -
##//constraints//##
<b>assume</b> {assumedCargoMass<U+003C><U+003D>500 [kg]}
}
E1 o- - "*"E2 [[psysml:7beacb0d-1e30-48d5-88ac-1cad5df20bd5 ]] 
E1 *- - "*"E3 [[psysml:a42abc9a-a565-4009-81e8-80dddb4c9103 ]] 
E1 *- - "*"E4 [[psysml:afad26bb-c7d4-4d18-a359-5a0efd737f9d ]] 
E4 *- - "*"E5 [[psysml:b0e45e43-d193-4d6d-9d4d-cf301df259d8 ]] 
E4 *- - "*"E6 [[psysml:480724af-c2de-45dc-8e51-bcba0fda86ea ]] 

@enduml

