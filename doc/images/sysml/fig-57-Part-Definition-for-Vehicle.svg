maintenanceTime: DateTime
mass:>mass
position:>length
velocity:>speed
- -
##//exhibit states//##
vehicleStates
- -
##//perform actions//##
applyParkingBrake
controlDirection
performSelfTest
provideBraking
providePower
senseTemperature
- -
##//ports//##
ignitionCmdPort: IgnitionCmdPort
pwrCmdPort: PwrCmdPort
statusPort: StatusPort
vehicleToRoadPort: VehicleToRoadPort
}
@enduml

