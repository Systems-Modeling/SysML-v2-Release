"#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="174" x="13" y="539.9795">:&gt;&gt;Vehicle::pwrCmdPort</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="212" x="13" y="556.2764">setSpeedPort: ~SetSpeedPort</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130" x="13" y="572.5732">vehicleToRoadPort</text><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="220" x="13" y="588.8701">:&gt;&gt;Vehicle::vehicleToRoadPort</text><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35" x="174.5" y="508.5154">ports</text></g></a><!--MD5=[4d359334dc395387509e166657b8af4c]
@startuml
skin sysmlbw
skinparam monochrome true
skinparam wrapWidth 300
hide circle
 
comp usage "vehicle_b: Vehicle " as E1  <<(T,blue) part>> [[psysml:fbe2a0ef-5fa2-4c7f-9c90-655aa1c64067 ]] {
##//attributes//##
cargoMass<b> default </b>0 [kg]\n//:>>Vehicle::cargoMass// 
avgFuelEconomy:> AttributeDefinitions::distancePerVolume
dryMass<U+003D>sum(partMasses)\n//:>>Vehicle::dryMass// 
mass<U+003D>dryMass+cargoMass+fuelTank.fuel.fuelMass\n//:>>Vehicle::mass// 
partMasses
- -
##//exhibit states//##
vehicleStates\n//:>>Vehicle::vehicleStates// 
- -
##//parts//##
fuelTank: FuelTank
- -
##//perform actions//##
providePower:> ActionTree::providePower\n//:>>Vehicle::providePower// 
performSelfTest:> ActionTree::performSelfTest\n//:>>Vehicle::performSelfTest// 
applyParkingBrake:> ActionTree::applyParkingBrake\n//:>>Vehicle::applyParkingBrake// 
senseTemperature:> ActionTree::senseTemperature\n//:>>Vehicle::senseTemperature// 
- -
##//ports//##
fuelCmdPort: FuelCmdPort\n//:>>Vehicle::pwrCmdPort// 
setSpeedPort: ~SetSpeedPort
vehicleToRoadPort\n//:>>Vehicle::vehicleToRoadPort// 
}
@enduml

