@startuml
skin sysmlbw
skinparam monochrome true
skinparam wrapWidth 300
hide circle
 
comp def "FuelTank" as E1  <<(T,blue) part  def>> [[psysml:0522f24e-2a2b-40e9-b63b-d64f8d912bfe ]] {
##//attributes//##
fuelKind: FuelKind
fuelMassMax:> ISQBase::mass
mass:> ISQBase::mass
- -
##//ports//##
fuelInPort: ~FuelPort
|_ 
fuelOutPort: FuelPort
|_ 
}
comp usage "fuel: Fuel " as E2  <<(T,blue) item>> [[psysml:2139d2b9-fd41-4111-ab67-7176ac47d139 ]] {
##//attributes//##
fuelMass\n//:>>Fuel::fuelMass// 
}
comp usage "fuelConstraint " as E3  <<(T,blue) assert constraint>> [[psysml:a97f83a4-e0b8-4b41-b351-eb6b99680006 ]] {
##//operator expressions//##
 { fuel.fuelMass<U+003C><U+003D>fuelMassMax }
}
E1 o- - "1"E2 [[psysml:e8ee6c98-8425-4359-ba02-7fbac8e8febc ]] 
E1 *- - "*"E3 [[psysml:917c70b0-5166-4d52-981e-4912697dda16 ]] 

@enduml

