@startuml
skin sysmlbw
skinparam linetype ortho
skinparam monochrome true
skinparam wrapWidth 300
hide circle
 
comp def "MassRequirement" as E1  <<(T,blue) requirement  def>> [[psysml:be1fee6d-1d64-4990-bae1-9f7c95cfd41d ]] {
##//doc//##
The actual mass shall be less than the required mass
- -
##//attributes//##
massActual:> ISQBase::mass
massRequired:> ISQBase::mass
- -
##//constraints//##
<b>require</b> {massActual<U+003C><U+003D>massRequired}
}

@enduml

