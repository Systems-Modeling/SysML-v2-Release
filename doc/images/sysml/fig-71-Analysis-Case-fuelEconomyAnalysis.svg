@startuml
skin sysmlbw
skinparam monochrome true
skinparam wrapWidth 300
hide circle
 
comp usage "fuelEconomyAnalysis  " as E1  << analysis>> [[psysml:f2967c58-ba32-4e3d-a80e-68f723380451 ]] {
##//parameters//##
<b>in</b> scenario: Scenario
<b>out</b> calculatedFuelEconomy:>AttributeDefinitions::distancePerVolume <U+003D>FuelConsumption(f<U+005F>a, f<U+005F>b, tpd<U+005F>avg)
- -
##//attributes//##
bsfc <U+003D> ComputeBSFC(vehicle<U+005F>b.engine)
distance <U+003D> TraveledDistance(scenario)
f_a <U+003D> BestFuelConsumptionPerDistance(vehicle<U+005F>b.mass, bsfc, tpd<U+005F>avg, distance)
f_b <U+003D> IdlingFuelConsumptionPerTime(vehicle<U+005F>b.engine)
tpd_avg <U+003D> AverageTravelTimePerDistance(scenario)
- -
##//objectives//##
fuelEconomyAnalysisObjective
- -
##//subject//##
subj <U+003D> vehicle<U+005F>b
}
@enduml

